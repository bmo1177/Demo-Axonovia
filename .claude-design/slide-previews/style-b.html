<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style B: Bold Signal</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;700&display=swap">
    <style>
        :root {
            --bg-primary: #1a1a1a;
            --card-bg: #FF5722;
            --text-primary: #ffffff;
            --text-on-card: #1a1a1a;
            --font-display: 'Archivo Black', sans-serif;
            --font-body: 'Space Grotesk', sans-serif;
        }
        body, html { margin: 0; padding: 0; height: 100%; height: 100dvh; background: var(--bg-primary); color: var(--text-primary); font-family: var(--font-body); overflow: hidden; }
        .slide { display: grid; grid-template-columns: 1fr; grid-template-rows: 1fr; height: 100%; position: relative; padding: 5vw; }
        .card { background: var(--card-bg); color: var(--text-on-card); padding: 40px; display: flex; flex-direction: column; justify-content: flex-end; position: relative; overflow: hidden; }
        h1 { font-family: var(--font-display); font-size: clamp(3rem, 10vw, 8rem); margin: 0; line-height: 0.8; text-transform: uppercase; }
        p { font-size: clamp(1.2rem, 3vw, 2rem); font-weight: 500; margin-top: 10px; max-width: 600px; }
        .number { position: absolute; top: 40px; left: 40px; font-family: var(--font-display); font-size: clamp(2rem, 5vw, 4rem); opacity: 0.2; }
        .nav { position: absolute; top: 40px; right: 40px; display: flex; gap: 10px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--text-on-card); }
        .dot.active { background: var(--text-on-card); }
    </style>
</head>
<body>
    <section class="slide">
        <div class="card">
            <div class="number">01</div>
            <div class="nav">
                <div class="dot active"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            <h1>VIGILO<br>MINI</h1>
            <p>Smart Transport Reconciliation Pipeline.</p>
        </div>
    </section>
</body>
</html>
