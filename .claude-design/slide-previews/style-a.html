<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style A: Neon Cyber</title>
    <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=clash-display@700,800&f[]=satoshi@400,500,700&display=swap">
    <style>
        :root {
            --bg-primary: #0a0f1c;
            --accent: #00ffcc;
            --secondary: #ff00aa;
            --text-primary: #ffffff;
            --font-display: 'Clash Display', sans-serif;
            --font-body: 'Satoshi', sans-serif;
        }
        body, html { margin: 0; padding: 0; height: 100%; height: 100dvh; background: var(--bg-primary); color: var(--text-primary); font-family: var(--font-body); overflow: hidden; }
        .slide { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; position: relative; padding: 40px; text-align: center; }
        .grid-bg { position: absolute; inset: 0; background-image: linear-gradient(rgba(0, 255, 204, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 204, 0.05) 1px, transparent 1px); background-size: 50px 50px; z-index: -1; }
        .glow { position: absolute; width: 400px; height: 400px; background: radial-gradient(circle, rgba(0, 255, 204, 0.2) 0%, transparent 70%); border-radius: 50%; z-index: -1; filter: blur(60px); }
        h1 { font-family: var(--font-display); font-size: clamp(2.5rem, 8vw, 6rem); margin-bottom: 20px; line-height: 0.9; text-transform: uppercase; color: var(--accent); text-shadow: 0 0 20px rgba(0, 255, 204, 0.5); }
        p { font-size: clamp(1rem, 2vw, 1.5rem); opacity: 0.8; letter-spacing: 2px; text-transform: uppercase; }
        .badge { display: inline-block; padding: 8px 16px; background: rgba(0, 255, 204, 0.1); border: 1px solid var(--accent); color: var(--accent); border-radius: 4px; font-size: 0.8rem; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="glow" style="top: 10%; right: 10%;"></div>
    <div class="glow" style="bottom: 10%; left: 10%; background: radial-gradient(circle, rgba(255, 0, 170, 0.1) 0%, transparent 70%);"></div>
    <section class="slide">
        <div class="badge">AI-NATIVE ENGINE</div>
        <h1>VIGILO MINI</h1>
        <p>Future-Ready Logistics Intelligence</p>
    </section>
</body>
</html>
